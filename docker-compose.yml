services:
  app:
    build: ./app
    container_name: nusantara-app
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=${POSTGRES_HOST}
      - DB_PORT=${POSTGRES_PORT}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USER=${MINIO_ROOT_USER}
      - MINIO_PASSWORD=${MINIO_ROOT_PASSWORD}
    depends_on:
      - minio
    restart: unless-stopped
    networks:
      - nusantara-network

  minio:
    image: minio/minio
    container_name: nusantara-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    restart: unless-stopped
    networks:
      - nusantara-network

volumes:
  miniodata:

networks:
  nusantara-network:
    name: nusantara-network
    driver: bridge